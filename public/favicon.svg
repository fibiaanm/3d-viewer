<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f0f0f"/>
  <!-- 3D cube isometric -->
  <!-- Top face -->
  <polygon points="16,4 27,10 16,16 5,10" fill="#e8e8e8"/>
  <!-- Left face -->
  <polygon points="5,10 16,16 16,28 5,22" fill="#888888"/>
  <!-- Right face -->
  <polygon points="27,10 16,16 16,28 27,22" fill="#b0b0b0"/>
  <!-- Edge lines -->
  <polyline points="16,4 27,10 27,22 16,28 5,22 5,10 16,4" stroke="#333" stroke-width="0.5" fill="none"/>
  <line x1="16" y1="16" x2="16" y2="28" stroke="#333" stroke-width="0.5"/>
  <line x1="16" y1="4" x2="16" y2="16" stroke="#333" stroke-width="0.5"/>
  <line x1="5" y1="10" x2="16" y2="16" stroke="#333" stroke-width="0.5"/>
  <line x1="27" y1="10" x2="16" y2="16" stroke="#333" stroke-width="0.5"/>
</svg>
